  <script>
    // 使链接在视窗内移动
    document.addEventListener('DOMContentLoaded', function() {
      const links = document.querySelectorAll('.floating-link');
      
      function moveLinks() {
        links.forEach(link => {
          const x = Math.random() * (window.innerWidth - link.offsetWidth);
          const y = Math.random() * (window.innerHeight - link.offsetHeight);
          link.style.left = x + 'px';
          link.style.top = y + 'px';
        });
      }
      
      // 每3秒重新定位链接
      setInterval(moveLinks, 3000);
      
      // 初始定位
      moveLinks();
    });
  </script>
