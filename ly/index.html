
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>公司地址展示</title>
  <link href="tailwind.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <script type="text/javascript" src="https://api.map.baidu.com/place/v3/detail?ak=ihs3u0Mi7p8ulTVdTiO8GL1CEozvMu56"></script>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen">
  <div class="container mx-auto px-4 py-8">
    <div class="text-center mb-8">
      <h1 class="text-4xl font-bold text-gray-800 mb-2">公司地址展示</h1>
      <p class="text-gray-600">查看我们的办公位置</p>
    </div>
    
    <div class="bg-white rounded-2xl shadow-xl overflow-hidden max-w-4xl mx-auto">
      <div class="p-6 border-b border-gray-200">
        <div class="flex items-center justify-between">
          <h2 class="text-2xl font-semibold text-gray-800">
            <i class="fas fa-map-marker-alt text-red-500 mr-2"></i>
            深圳坪山
          </h2>

        </div>
      </div>
      <img src="2.png" alt="描述文字">
  
      <div class="p-6 bg-gray-50">
        <div class="flex flex-wrap items-center justify-between">
          <div class="flex items-center mb-4 md:mb-0">
            <i class="fas fa-building text-blue-500 text-xl mr-3"></i>
            <div>
              <p class="font-medium text-gray-800">公司地址</p>
              <p class="text-gray-600">深圳市海淀区中关村大街1号海龙大厦</p>
            </div>
          </div>
          <div class="flex items-center">
            <i class="fas fa-phone text-green-500 text-xl mr-3"></i>
            <div>
              <p class="font-medium text-gray-800">联系电话</p>
              <p class="text-gray-600">010-12345678</p>
            </div>

        </div>
      </div>
    </div>
    
    <div class="mt-8 max-w-4xl mx-auto">
      <div class="bg-white rounded-2xl shadow-xl p-6">
        <h3 class="text-xl font-semibold text-gray-800 mb-4">交通指南</h3>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
          <div class="border-l-4 border-blue-500 pl-4 py-2">
            <h4 class="font-medium text-gray-800">地铁</h4>
            <p class="text-gray-600 text-sm">地铁14号快线坪山围站A出口，步行800米</p>
          </div>
          <div class="border-l-4 border-green-500 pl-4 py-2">
            <h4 class="font-medium text-gray-800">公交</h4>
            <p class="text-gray-600 text-sm">中关村大街站，多条线路可达</p>
          </div>
          <div class="border-l-4 border-purple-500 pl-4 py-2">
            <h4 class="font-medium text-gray-800">自驾</h4>
            <p class="text-gray-600 text-sm">导航至中关村大街1号，提供地下停车场</p>
          </div>
        </div>
      </div>
    </div>
  </div>


</body>
</html>
