
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>网络留言应用</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    .fade-in {
      animation: fadeIn 0.5s ease-in-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen">
  <header class="bg-indigo-600 text-white shadow-lg py-6">
    <div class="container mx-auto px-4">
      <h1 class="text-3xl font-bold flex items-center">
        <i class="fas fa-comments mr-3"></i> 网络留言应用
      </h1>
      <p class="mt-2 text-indigo-200">留下你的想法，与世界分享</p>
    </div>
  </header>

  <main class="container mx-auto px-4 py-8">
    <!-- 留言输入区 -->
    <section class="bg-white rounded-xl shadow-lg p-6 mb-8 fade-in">
      <h2 class="text-xl font-semibold text-gray-800 mb-4">发表留言</h2>
      <form id="messageForm" class="space-y-4">
        <div>
          <label for="username" class="block text-sm font-medium text-gray-700 mb-1">昵称</label>
          <input type="text" id="username" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent" placeholder="请输入昵称" required>
        </div>
        <div>
          <label for="content" class="block text-sm font-medium text-gray-700 mb-1">留言内容</label>
          <textarea id="content" rows="4" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent" placeholder="写下你的留言..." required></textarea>
        </div>
        <div class="flex justify-end">
          <button type="submit" class="px-5 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition duration-300 flex items-center">
            <i class="fas fa-paper-plane mr-2"></i> 发布留言
          </button>
        </div>
      </form>
    </section>

    <!-- 留言展示区 -->
    <section>
      <h2 class="text-2xl font-semibold text-gray-800 mb-4 flex items-center">
        <i class="fas fa-comment-alt mr-2"></i> 留言列表
      </h2>
      <div id="messageList" class="space-y-4">
        <!-- 留言将动态插入此处 -->
      </div>
      <div id="noMessages" class="text-center py-10 text-gray-500 hidden">
        <i class="fas fa-inbox text-4xl mb-3"></i>
        <p>还没有留言，快来发表第一条吧！</p>
      </div>
    </section>
  </main>

  <footer class="bg-gray-800 text-white py-6 text-center text-sm">
    &copy; 2025 网络留言应用. 所有留言由用户自行负责。
  </footer>

  <script src="app.js"></script>
</body>
</html>
